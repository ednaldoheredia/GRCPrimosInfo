name: Build Project

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  versionamento:
    runs-on: ubuntu-latest
    name: Versionamento
    permissions:
      contents: write

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Git Version
        id: version
        uses: codacy/git-version@2.8.0
        with:
          release-branch: master
          prefix: v

      - name: Tag do Repositorio
        #if: github.ref == 'refs/heads/master'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::notice:: ${{ steps.version.outputs.version }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git config --global user.name "${{ github.actor }}"
          git tag ${{ steps.version.outputs.version }}
          git push origin --tags

      - name: Create file versao
        run: |
          echo ${{ steps.version.outputs.version }} > versao.txt
       # if: github.ref == 'refs/heads/master'

      - uses: actions/upload-artifact@v4
        with:
          name: versao
          path: versao.txt
       ## if: github.ref == 'refs/heads/master'

  build:
    runs-on: ubuntu-latest
    name: Build Project
    needs: versionamento

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ALTERACAO 1: Atualizado de '6.0.x' para '9.0.x' para suportar seu projeto .NET 9
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore GRC.WebApp/GRC.WebApp.csproj

      - name: Build project
        run: dotnet build GRC.WebApp/GRC.WebApp.csproj --configuration Release --no-restore

      - name: Test project
        run: |
          dotnet test GRC.WebApp/GRC.WebApp.csproj \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --logger trx \
            --results-directory "TestResults"